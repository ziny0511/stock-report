name: 매일 주식 리포트 자동 생성

on:
  schedule:
    - cron: '0 21 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 원시 데이터 캐시 복원
        uses: actions/cache@v4
        with:
          path: docs/data/raw
          key: krx-raw-${{ runner.os }}-${{ hashFiles('krx_market.py') }}
          restore-keys: |
            krx-raw-${{ runner.os }}-

      - name: 리포트 생성
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          KRX_API_KEY:  ${{ secrets.KRX_API_KEY }}
        run: python build_report.py

      - name: GitHub에 결과 저장
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "리포트 자동 업데이트: $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
